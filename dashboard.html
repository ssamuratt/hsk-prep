<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель управления · HSK.ILS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .level-block { margin-bottom: 40px; }
    .level-title { 
      font-size: 1.5rem; 
      color: var(--primary); 
      margin-bottom: 15px; 
      border-left: 4px solid var(--primary); 
      padding-left: 10px;
    }
    .variants-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
    }
    .variant-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: var(--radius);
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }
    .variant-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    .variant-card h4 { margin-bottom: 10px; color: var(--text-main); }
  </style>
</head>
<body class="dashboard-page">
  <header class="site-header">
    <div class="container header-inner">
      <a href="dashboard.html" class="logo">
        <span class="logo-han">汉</span>
        <span class="logo-text">HSK.ILS</span>
      </a>
      <nav class="nav">
        <a href="dashboard.html" class="active">Все тесты</a>
      </nav>
    </div>
  </header>

  <main class="container" style="margin-top: 30px;">
    <div class="welcome-card">
      <h1>Интерактивная база Mock-тестов HSK 🚀</h1>
      <p>Выбирай нужный уровень и тренируйся бесплатно. Все тесты разбиты по частям с автопроверкой и оригинальной озвучкой Apple/Google.</p>
    </div>

    <div id="hsk-levels-container">
      </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('hsk-levels-container');
      
      // Генерируем структуру от HSK 1 до HSK 5
      for (let lvl = 1; lvl <= 5; lvl++) {
        const levelBlock = document.createElement('div');
        levelBlock.className = 'level-block';
        
        levelBlock.innerHTML = `<h3 class="level-title">Уровень HSK ${lvl}</h3>`;
        
        const grid = document.createElement('div');
        grid.className = 'variants-grid';
        
        // По 5 вариантов в каждом
        for (let v = 1; v <= 5; v++) {
          const card = document.createElement('div');
          card.className = 'variant-card';
          card.innerHTML = `
            <h4>Вариант ${v}</h4>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px;">5 Parts · Микс заданий</p>
            <a href="test.html?exam=hsk${lvl}-v${v}" class="btn btn-primary btn-sm" style="width: 100%;">Запустить</a>
          `;
          grid.appendChild(card);
        }
        
        levelBlock.appendChild(grid);
        container.appendChild(levelBlock);
      }
    });
  </script>
</body>
</html>
