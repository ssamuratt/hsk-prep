<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Симулятор экзамена · HSK.ILS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="test-page">
  <header class="test-header">
    <div class="container test-header-inner">
      <a href="dashboard.html" class="logo logo-sm">
        <span class="logo-han">汉</span>
        <span class="logo-text">HSK.ILS</span>
      </a>
      <div class="test-meta">
        <span class="test-level" id="exam-title">HSK Test</span>
        <span class="test-progress">Задание <span id="current-q">1</span> / <span id="total-q">3</span></span>
      </div>
      <div class="timer" id="timer">
        <span class="timer-icon">⏱</span>
        <span id="timer-display">25:00</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </header>

  <main class="test-main">
    <div class="container test-container">
      
      <!-- Инструкция к секции -->
      <section class="test-section">
        <h2 id="section-title" class="section-title">Загрузка...</h2>
        <p id="section-desc" class="section-desc"></p>
      </section>

      <!-- Блок с Аудио (показывается только если в вопросе есть аудио) -->
      <section class="audio-block" id="audio-block" hidden>
        <div class="audio-player">
          <button type="button" class="audio-play-btn" id="play-btn">
            <span class="play-icon" id="play-icon">▶</span>
          </button>
          <div class="audio-info">
            <p class="audio-title">Слушать запись</p>
            <span class="audio-hint">Осталось прослушиваний: <span id="plays-left">2</span></span>
          </div>
        </div>
      </section>

      <!-- Основной блок вопроса -->
      <section class="question-block">
        <div class="question-header">
          <span class="question-num" id="q-num-badge">1</span>
          <p class="question-instruction" id="q-instruction">Инструкция</p>
        </div>
        
        <!-- Текст вопроса (иероглифы или задание) -->
        <div class="question-main-text" id="q-text" style="font-size: 1.5rem; margin: 1rem 0; font-weight: bold;"></div>

        <!-- ДИНАМИЧЕСКИЙ БЛОК ОТВЕТОВ -->
        <div id="answers-container">
          <!-- Сюда JS будет вставлять либо текстовое поле, либо варианты выбора (A, B, C) -->
        </div>

        <!-- Подсказка ИИ -->
        <div class="ai-hint" id="ai-hint" hidden>
          <span class="ai-badge">AI</span>
          <p id="ai-hint-text">Анализ...</p>
        </div>
      </section>

      <nav class="test-nav">
        <button type="button" class="btn btn-ghost" id="prev-btn">← Назад</button>
        <button type="button" class="btn btn-secondary" id="check-btn" hidden>Проверить с ИИ</button>
        <button type="button" class="btn btn-primary" id="next-btn">Далее →</button>
      </nav>
    </div>
  </main>

  <script>
    (function () {
      // БАЗА ДАННЫХ ТЕСТОВ (Сюда ты можешь прописывать бесконечно много пробников!)
      const examBank = {
        'hsk3-demo': {
          title: 'HSK 3 — Демо Тест',
          questions: [
            {
              type: 'write', // Тип: Написание иероглифов с ИИ
              section: '听力理解 · Аудирование',
              instruction: 'Послушайте аудио и запишите фразу иероглифами:',
              text: '«Привет, я хочу учить китайский язык»',
              tts: '你好，我想学习汉语。',
              sample: '你好，我想学习汉语。'
            },
            {
              type: 'choice', // Тип: Тест (Выбор ответа)
              section: '阅读理解 · Чтение',
              instruction: 'Выберите правильный иероглиф для пиньиня "mēng":',
              text: '明天 я пойду в школу. Как пишется "Míngtiān"?',
              options: ['A) 昨天', 'B) 明天', 'C) 天气'],
              correctAnswer: 1 // Индекс правильного ответа (B)
            },
            {
              type: 'write',
              section: '书写 · Письмо',
              instruction: 'Переведите на китайский язык и запишите иероглифами:',
              text: '«Сегодня очень жарко»',
              sample: '今天很热。',
              tts: '今天很热。'
            }
          ]
        },
        'hsk1-mock': {
          title: 'HSK 1 — Пробный Вариант',
          questions: [
            {
              type: 'choice',
              section: '听力 · Аудирование',
              instruction: 'Слушайте слово и выберите перевод:',
              text: 'Что означает это слово?',
              tts: '谢谢',
              options: ['A) Привет', 'B) Спасибо', 'C) До свидания'],
              correctAnswer: 1
            }
          ]
        }
      };

      // Определяем, какой тест запустить (берём из ссылки типа test.html?exam=hsk3-demo)
      const urlParams = new URLSearchParams(window.location.search);
      const examKey = urlParams.get('exam') || 'hsk3-demo'; // если ничего не указано, запустим hsk3-demo
      const currentExam = examBank[examKey] || examBank['hsk3-demo'];

      let currentQuestionIdx = 0;
      let playCount = 0;
      const savedAnswers = {};

      // Элементы страницы
      const examTitleEl = document.getElementById('exam-title');
      const sectionTitleEl = document.getElementById('section-title');
      const qInstructionEl = document.getElementById('q-instruction');
      const qTextEl = document.getElementById('q-text');
      const currentQEl = document.getElementById('current-q');
      const totalQEl = document.getElementById('total-q');
      const answersContainer = document.getElementById('answers-container');
      const audioBlock = document.getElementById('audio-block');
      const playBtn = document.getElementById('play-btn');
      const playsLeftEl = document.getElementById('plays-left');
      const nextBtn = document.getElementById('next-btn');
      const prevBtn = document.getElementById('prev-btn');
      const checkBtn = document.getElementById('check-btn');

      examTitleEl.textContent = currentExam.title;
      totalQEl.textContent = currentExam.questions.length;

      function renderQuestion() {
        const q = currentExam.questions[currentQuestionIdx];
        currentQEl.textContent = currentQuestionIdx + 1;
        document.getElementById('q-num-badge').textContent = currentQuestionIdx + 1;
        
        sectionTitleEl.textContent = q.section;
        qInstructionEl.textContent = q.instruction;
        qTextEl.textContent = q.text;

        // Настройка аудио
        if (q.tts) {
          audioBlock.hidden = false;
          playCount = 0;
          playsLeftEl.textContent = '2';
        } else {
          audioBlock.hidden = true;
        }

        // Очищаем старые ответы и рендерим новые в зависимости от ТИПА задания
        answersContainer.innerHTML = '';
        document.getElementById('ai-hint').hidden = true;
        checkBtn.hidden = true;

        if (q.type === 'write') {
          checkBtn.hidden = false; // Показываем кнопку ИИ только для открытых вопросов
          answersContainer.innerHTML = `
            <textarea id="answer-input" class="answer-input" rows="3" placeholder="Введите иероглифы здесь..."></textarea>
          `;
          const input = document.getElementById('answer-input');
          input.value = savedAnswers[currentQuestionIdx] || '';
          input.addEventListener('input', () => savedAnswers[currentQuestionIdx] = input.value);
        } 
        else if (q.type === 'choice') {
          q.options.forEach((option, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-ghost';
            btn.style.display = 'block';
            btn.style.width = '100%';
            btn.style.textAlign = 'left';
            btn.style.margin = '0.5rem 0';
            btn.textContent = option;

            if (savedAnswers[currentQuestionIdx] === idx) {
              btn.style.background = '#e3f2fd';
              btn.style.borderColor = '#2196f3';
            }

            btn.onclick = () => {
              savedAnswers[currentQuestionIdx] = idx;
              renderQuestion(); // Перерисовать, чтобы подсветить кликнутый вариант
            };
            answersContainer.appendChild(btn);
          });
        }

        prevBtn.disabled = currentQuestionIdx === 0;
        nextBtn.textContent = currentQuestionIdx === currentExam.questions.length - 1 ? 'Завершить тест' : 'Далее →';
      }

      // Логика аудио-произношения
      playBtn.addEventListener('click', () => {
        const q = currentExam.questions[currentQuestionIdx];
        if (!q.tts || playCount >= 2) return;
        
        playCount++;
        playsLeftEl.textContent = 2 - playCount;

        const utterance = new SpeechSynthesisUtterance(q.tts);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.75;
        window.speechSynthesis.speak(utterance);
      });

      nextBtn.addEventListener('click', () => {
        if (currentQuestionIdx < currentExam.questions.length - 1) {
          currentQuestionIdx++;
          renderQuestion();
        } else {
          // Расчет результатов и переход на страницу итогов
          alert('Тест завершен! Переходим к результатам.');
          window.location.href = 'dashboard.html'; 
        }
      });

      prevBtn.addEventListener('click', () => {
        if (currentQuestionIdx > 0) {
          currentQuestionIdx--;
          renderQuestion();
        }
      });

      renderQuestion();
    })();
  </script>
</body>
</html>
